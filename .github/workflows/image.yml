name: publish-container-image

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution:    'temurin'
          java-version:    '21'
          server-username: PACKAGES_USERNAME_REF # env variable name for username
          server-password: PACKAGES_TOKEN_REF    # env variable name for token

      - name: Build with Maven
        run: mvn -B package --file pom.xml
        env:
          PACKAGES_USERNAME_REF: ${{ secrets.PACKAGES_USERNAME }}
          PACKAGES_TOKEN_REF:    ${{ secrets.PACKAGES_TOKEN }}

      - name: Get application version
        run: |
          VERSION=$(java -jar target/cql-on-omop-*.jar --version | sed -Ee "s/cql-on-omop (.*)/\1/")
          echo "APPLICATION_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Build the Docker image
        run: |
          docker build                                             \
            --build-arg=CQL_ON_OMOP_VERSION=${APPLICATION_VERSION} \
            -t ghcr.io/${{ env.IMAGE_NAME }}:${APPLICATION_VERSION} \
            -f Containerfile .
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:${APPLICATION_VERSION} \
                     ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.PACKAGES_USERNAME }}
          password: ${{ secrets.PACKAGES_TOKEN }}

      - name: Push the Docker image
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${APPLICATION_VERSION}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
