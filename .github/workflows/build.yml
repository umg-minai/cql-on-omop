name: build-application

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution:    'temurin'
          java-version:    '21'
          server-username: PACKAGES_USERNAME # env variable name for username
          server-password: PACKAGES_TOKEN    # env variable name for GitHub Personal Access To

      - name: Build with Maven
        run: mvn -B package --file pom.xml
        env:
          PACKAGES_USERNAME: ''
          PACKAGES_TOKEN:    ${{ secrets.GITHUB_TOKEN }}

      - name: Gather Artifacts
        run: |
          mkdir -p artifacts
          cp -v target/cql-on-omop*.jar artifacts/

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: application
          path: artifacts

      - name: Publish package
        if: ${{ github.ref == 'refs/heads/main' }}
        run: mvn deploy --file pom.xml
        env:
          PACKAGES_USERNAME: ''
          PACKAGES_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
